<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫画進捗管理App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
        .genkou-paper { background-color: #fff; position: relative; }
        .safety-line { position: absolute; inset: 8%; border: 1px solid rgba(200, 230, 255, 0.6); pointer-events: none; }
        
        /* 工程管理エリアの開閉アニメーション */
        #gantt-sidebar { transition: width 0.3s ease; overflow: hidden; }
        #gantt-sidebar.closed { width: 40px; }
        #gantt-sidebar.closed .content { display: none; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 h-screen flex flex-col overflow-hidden font-sans">

        
    <header class="h-16 border-b border-gray-200 flex items-center justify-between px-4 bg-white z-20 flex-shrink-0 shadow-sm">
        <div class="flex items-center space-x-4">
            <h1 class="app-title">
                <span class="full-text text-xl font-black tracking-tighter text-blue-600">漫画進捗管理App</span>
                <span class="short-text text-sm font-black tracking-tighter text-blue-600">進捗App</span>
            </h1>
            <input type="text" id="project-title" class="bg-gray-50 border border-gray-200 rounded px-2 py-1 focus:outline-none text-sm w-32 md:w-48" value="新刊ネーム">
        </div>

        <div class="flex items-center space-x-3">
            <div class="import-area">
            <input type="file" id="json-input" accept=".json" style="display:none;">
            <button onclick="document.getElementById('json-input').click()">JSONを読み込む</button>
            </div>
            <button onclick="exportData()" title="保存" class="p-2 rounded-full hover:bg-gray-100 text-gray-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
            </button>
            <div class="h-8 w-px bg-gray-200 mx-2"></div>
            <div class="flex flex-col items-end">
                <p class="text-[10px] text-gray-400 font-bold leading-none">入稿締め切り日</p>
                <div class="flex items-center space-x-2">
                    <input type="date" id="deadline-date" class="text-xs bg-gray-50 border border-gray-200 rounded px-1 focus:outline-none">
                    <div class="flex items-baseline bg-red-50 px-2 rounded border border-red-100">
                        <span id="days-left" class="text-lg font-black text-red-600 tracking-tighter">--</span>
                        <span class="text-[10px] font-bold text-red-600 ml-0.5">日</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <nav class="bg-white border-b border-gray-200 flex px-4 shadow-sm z-10 flex-shrink-0">
        <button id="tab-edit" onclick="switchMode('edit')" class="px-6 py-2 text-sm font-bold border-b-2 border-blue-600 text-blue-600 transition-all duration-200">ページ構成</button>
        <button id="tab-gantt" onclick="switchMode('gantt')" class="px-6 py-2 text-sm font-bold border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition-all duration-200">日程管理</button>
    </nav>

    <div class="relative flex-1 overflow-hidden">
        
        <section id="edit-view" class="absolute inset-0 flex flex-col md:flex-row overflow-hidden bg-gray-100">
            <div class="w-full md:w-[30%] lg:w-[25%] border-b md:border-b-0 md:border-r border-gray-200 flex flex-col bg-gray-50 flex-shrink-0 min-h-[150px]">
                <div class="p-2 px-4 text-xs font-bold text-gray-500 border-b border-gray-200 bg-white">プロット</div>
                <textarea id="main-plot" class="flex-1 p-4 bg-transparent text-gray-800 focus:outline-none resize-none leading-relaxed text-sm" placeholder="プロットを入力..."></textarea>
            </div>
            <div class="flex-1 flex flex-col overflow-hidden">
                <div class="p-2 px-4 text-xs font-bold text-gray-500 border-b border-gray-200 bg-white flex justify-between items-center">
                    <span>ページ割</span>
                    <button onclick="addNewPage()" class="text-[10px] bg-blue-600 text-white px-3 py-1 rounded font-bold">ページ追加</button>
                </div>
                <div id="grid-container" class="flex-1 overflow-y-auto p-4 md:p-8 grid grid-cols-2 lg:grid-cols-4 2xl:grid-cols-6 gap-x-2 gap-y-6 md:gap-y-10 items-start">
                </div>
            </div>
        </section>

        <section id="gantt-view" class="hidden absolute inset-0 flex overflow-hidden bg-gray-100">
            
            <div class="absolute top-4 right-8 z-50 flex items-center space-x-3">
                <div class="bg-white/90 backdrop-blur px-3 py-1.5 rounded-full shadow-sm border border-red-100 flex items-center">
                    <span class="text-[10px] font-bold text-gray-400 mr-2 uppercase tracking-wider">Deadline</span>
                    <span id="gantt-days-left" class="text-lg font-black text-red-500 leading-none">--</span>
                    <span class="text-[10px] font-bold text-red-500 ml-1">日</span>
                </div>
                <button onclick="scrollToToday()" class="bg-blue-600 hover:bg-blue-700 text-white text-[10px] font-bold px-4 py-2 rounded-full shadow-lg transition-all active:scale-95 flex items-center">
                    <span class="mr-1">📍</span> 今日に戻る
                </button>
            </div>

            <div id="gantt-sidebar" class="w-64 border-r border-gray-200 bg-gray-50 flex-shrink-0 flex flex-col relative transition-all duration-300 z-30">
                    <div class="p-2 border-b bg-white flex justify-between items-center sticky top-0 z-10">
                        <span class="content text-[10px] font-bold text-gray-400 uppercase tracking-widest">日程管理</span>
                        <button onclick="toggleGanttSidebar()" class="p-1 hover:bg-gray-100 rounded text-gray-400">
                            <svg id="sidebar-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" /></svg>
                        </button>
                    </div>
                    
                    <div id="gantt-inputs" class="content flex-1 p-4 space-y-6 overflow-y-auto">
                        <div class="p-3 bg-red-50 rounded border border-red-200 shadow-sm text-xs">
                            <div class="font-bold text-red-700 mb-2 border-b border-red-200 pb-1 flex items-center">
                                <span class="mr-1">🚩</span> イベント・重要期限
                            </div>
                            <div class="space-y-2">
                                <input type="text" id="event-name" placeholder="例：コミケ当日" class="w-full border rounded px-2 py-1 text-[10px] focus:outline-none focus:border-red-400" oninput="saveAll(); renderGantt();">
                                <input type="date" id="event-date" class="w-full border rounded px-2 py-1 text-[11px] focus:outline-none focus:border-red-400" onchange="saveAll(); renderGantt();">
                            </div>
                        </div>
                        </div>
                </div>

                <div id="gantt-container" class="flex-1 overflow-auto relative bg-white">
                    <div id="gantt-grid" class="relative min-h-full"></div>
                </div>
            </section>
        
    </div>

    <script src="js/script.js"></script>
</body>
</html>
